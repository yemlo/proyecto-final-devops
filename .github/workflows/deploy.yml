name: CI/CD Proyecto DevOps

on:
  push:
    branches:
      - main

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: ./app
        run: npm install

      - name: Ejecutar pruebas basicas
        working-directory: ./app
        run: npm test

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USER }}/proyecto-final-devops:latest .

      - name: Subir imagen a Docker Hub
        run: docker push ${{ secrets.DOCKER_USER }}/proyecto-final-devops:latest